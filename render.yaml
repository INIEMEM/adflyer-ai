services:
  - type: web
    name: adflyer-ai-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: CLIENT_URL
        sync: false
