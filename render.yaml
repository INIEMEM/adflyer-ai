services:
  - type: web
    name: adflyer-ai-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-4o
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: IMAGE_PROVIDER
        value: openai
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: ByteDance/Hyper-SD
      - key: POLLINATIONS_IMAGE_URL
        value: https://image.pollinations.ai
      - key: CLIENT_URL
        value: https://adflyer-ai.vercel.app
