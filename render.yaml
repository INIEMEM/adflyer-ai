services:
  - type: web
    name: adflyer-ai-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: IMAGE_PROVIDER
        value: huggingface
      - key: HF_TOKEN
        sync: false
      - key: HF_TEXT_MODEL
        value: meta-llama/Llama-3.3-70B-Instruct
      - key: HF_MODEL
        value: stabilityai/stable-diffusion-xl-base-1.0
      - key: POLLINATIONS_IMAGE_URL
        value: https://image.pollinations.ai
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://adflyer-ai.vercel.app
